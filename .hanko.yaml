# hanko's own .hanko.yaml — used by `just release` (which calls `hanko seal`).
#
# The seal pipeline:
#   1. Pre-flight (refuses dirty worktree / detached HEAD / pre-release)
#   2. Apply stamp-targets to the computed version
#   3. Run seal.pre-commit hooks (none today)
#   4. Single release commit
#   5. Annotated tag (D-002 prefix mirroring)
#   6. git push --atomic for commit + tag
#
# Everything else (commit-message, push-remote, bump-strategy, …) is at the
# default — see `hanko config show` for the resolved view.
stamp-targets:
  - path: flake.nix
    format: nix
    key: version
